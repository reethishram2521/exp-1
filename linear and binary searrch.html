<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Search Visualizer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            border-radius:20px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.2);
        }

        .array-box{
            display:inline-block;
            width:55px;
            height:55px;
            line-height:55px;
            margin:5px;
            border-radius:10px;
            background:#f8f9fa;
            font-weight:bold;
            border:2px solid #dee2e6;
        }

        .highlight{
            background:#28a745 !important;
            color:white;
            transform:scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card p-4">
                <h2 class="text-center text-primary mb-4">
                    Linear & Binary Search Visualizer
                </h2>

                <div class="mb-3">
                    <label class="form-label">
                        Enter Numbers (Space Separated)
                    </label>
                    <input type="text"
                           class="form-control"
                           id="arrayInput"
                           placeholder="10 20 30 40 50">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Search Element
                    </label>
                    <input type="number"
                           class="form-control"
                           id="targetInput"
                           placeholder="Enter Number">
                </div>

                <div class="text-center">
                    <button class="btn btn-primary me-2"
                            onclick="linearSearch()">
                        Linear Search
                    </button>

                    <button class="btn btn-success"
                            onclick="binarySearch()">
                        Binary Search
                    </button>
                </div>

                <hr>

                <h5 class="text-center">Array Visualization</h5>

                <div id="arrayDisplay"
                     class="text-center my-3">
                </div>

                <div id="result"></div>

            </div>
        </div>
    </div>
</div>

<script>

function displayArray(arr, highlightIndex=-1){
    let html = "";

    arr.forEach((value,index)=>{
        html += `
        <div class="array-box ${index===highlightIndex ? 'highlight' : ''}">
            ${value}
        </div>`;
    });

    document.getElementById("arrayDisplay").innerHTML = html;
}

function linearSearch(){

    let arr = document.getElementById("arrayInput")
            .value.trim().split(" ").map(Number);

    let target = Number(
        document.getElementById("targetInput").value
    );

    let foundIndex = -1;

    for(let i=0;i<arr.length;i++){
        if(arr[i]===target){
            foundIndex=i;
            break;
        }
    }

    displayArray(arr,foundIndex);

    if(foundIndex!==-1){
        document.getElementById("result").innerHTML=
        `<div class="alert alert-success">
            <strong>Linear Search Successful!</strong><br>
            Element <b>${target}</b> found at index <b>${foundIndex}</b>.
        </div>`;
    }
    else{
        document.getElementById("result").innerHTML=
        `<div class="alert alert-danger">
            Element not found.
        </div>`;
    }
}

function binarySearch(){

    let arr = document.getElementById("arrayInput")
            .value.trim().split(" ").map(Number);

    arr.sort((a,b)=>a-b);

    let target = Number(
        document.getElementById("targetInput").value
    );

    let left=0;
    let right=arr.length-1;
    let foundIndex=-1;

    while(left<=right){

        let mid=Math.floor((left+right)/2);

        if(arr[mid]===target){
            foundIndex=mid;
            break;
        }

        if(arr[mid]<target){
            left=mid+1;
        }
        else{
            right=mid-1;
        }
    }

    displayArray(arr,foundIndex);

    if(foundIndex!==-1){
        document.getElementById("result").innerHTML=
        `<div class="alert alert-success">
            <strong>Binary Search Successful!</strong><br>
            Element <b>${target}</b> found at index <b>${foundIndex}</b>.<br>
            Sorted Array Used: ${arr.join(", ")}
        </div>`;
    }
    else{
        document.getElementById("result").innerHTML=
        `<div class="alert alert-danger">
            Element not found.<br>
            Sorted Array: ${arr.join(", ")}
        </div>`;
    }
}

</script>

</body>
</html>
